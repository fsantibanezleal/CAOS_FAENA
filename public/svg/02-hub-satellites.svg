<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" class="arch-svg" role="img" aria-label="The hub-and-satellites model: one launcher indexes many independent member app deployments, all sharing the app shell and a provenance data vault">
  <style>
    .arch-svg text { font-family: var(--font-sans, Inter, "Segoe UI", system-ui, sans-serif); }
    .arch-svg .mono { font-family: var(--font-mono, ui-monospace, Consolas, monospace); }
    .arch-svg .bx { fill: var(--color-surface-2); stroke: var(--color-border); stroke-width: 1.2; }
    .arch-svg .hub { fill: var(--color-surface-2); stroke: var(--color-accent); stroke-width: 1.8; }
    .arch-svg .sat-live { fill: var(--color-surface-2); stroke: var(--color-good); stroke-width: 1.5; }
    .arch-svg .sat-bld { fill: var(--color-surface-2); stroke: var(--color-accent); stroke-width: 1.3; stroke-dasharray: 4 3; }
    .arch-svg .ttl { fill: var(--color-fg); font-size: 13px; font-weight: 700; }
    .arch-svg .sub { fill: var(--color-fg-subtle); font-size: 10px; }
    .arch-svg .it  { fill: var(--color-fg); font-size: 10.5px; font-weight: 700; }
    .arch-svg .mu  { fill: var(--color-fg-subtle); font-size: 9.5px; }
    .arch-svg .cd  { fill: var(--color-accent); font-size: 9.5px; }
    .arch-svg .gd  { fill: var(--color-good); font-size: 9px; font-weight: 700; }
    .arch-svg .link { fill: none; stroke: var(--color-fg-faint); stroke-width: 1.3; }
    .arch-svg .link-sh { fill: none; stroke: var(--color-magenta); stroke-width: 1.2; stroke-dasharray: 3 3; }
    .arch-svg .lbl { fill: var(--color-fg-subtle); font-size: 8.5px; }
    .arch-svg .lbl-sh { fill: var(--color-magenta); font-size: 8.5px; }
  </style>
  <defs>
    <marker id="hs-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--color-fg-faint)"/>
    </marker>
  </defs>

  <text class="ttl" x="24" y="30">One launcher, many independent apps</text>
  <text class="sub" x="24" y="47">Faena is a hub, not a monolith: each app is its own repo, its own deployment. The hub only indexes and deep-links them.</text>

  <!-- Hub center -->
  <rect class="hub" x="360" y="196" width="180" height="72" rx="12"/>
  <text class="it" x="450" y="228" text-anchor="middle">Faena hub</text>
  <text class="mu" x="450" y="246" text-anchor="middle">launcher / catalog</text>
  <text class="cd mono" x="450" y="262" text-anchor="middle" style="font-size:8.5px">faena.fasl-work.com</text>

  <!-- Satellites (members) -->
  <rect class="sat-live" x="70"  y="96"  width="150" height="46" rx="9"/>
  <text class="mu" x="145" y="115" text-anchor="middle">RotorVitals</text>
  <text class="gd" x="145" y="132" text-anchor="middle">live · at-bar</text>

  <rect class="sat-live" x="70"  y="212" width="150" height="46" rx="9"/>
  <text class="mu" x="145" y="231" text-anchor="middle">ChargeCascade</text>
  <text class="gd" x="145" y="248" text-anchor="middle">live · at-bar</text>

  <rect class="sat-bld"  x="70"  y="328" width="150" height="46" rx="9"/>
  <text class="mu" x="145" y="347" text-anchor="middle">TailWatch</text>
  <text class="cd" x="145" y="364" text-anchor="middle" style="font-size:9px;font-weight:700">building</text>

  <rect class="sat-live" x="680" y="96"  width="150" height="46" rx="9"/>
  <text class="mu" x="755" y="115" text-anchor="middle">CutoffGrade</text>
  <text class="gd" x="755" y="132" text-anchor="middle">live · at-bar</text>

  <rect class="sat-bld"  x="680" y="212" width="150" height="46" rx="9"/>
  <text class="mu" x="755" y="231" text-anchor="middle">PitForge</text>
  <text class="cd" x="755" y="248" text-anchor="middle" style="font-size:9px;font-weight:700">building</text>

  <rect class="sat-bld"  x="680" y="328" width="150" height="46" rx="9"/>
  <text class="mu" x="755" y="347" text-anchor="middle">... 34 more</text>
  <text class="cd" x="755" y="364" text-anchor="middle" style="font-size:9px;font-weight:700">building / planned</text>

  <!-- aggregate links (hub -> members) -->
  <path class="link" d="M360 224 C300 210 270 150 220 122" marker-end="url(#hs-arrow)"/>
  <path class="link" d="M360 232 C300 234 260 235 220 235" marker-end="url(#hs-arrow)"/>
  <path class="link" d="M360 250 C300 300 270 330 220 348" marker-end="url(#hs-arrow)"/>
  <path class="link" d="M540 224 C600 210 640 150 680 122" marker-end="url(#hs-arrow)"/>
  <path class="link" d="M540 232 C600 234 640 235 680 235" marker-end="url(#hs-arrow)"/>
  <path class="link" d="M540 250 C600 300 640 330 680 348" marker-end="url(#hs-arrow)"/>
  <text class="lbl" x="300" y="180">aggregates + deep-links</text>

  <!-- shared infra -->
  <rect class="bx" x="300" y="352" width="140" height="52" rx="9"/>
  <text class="mu" x="370" y="372" text-anchor="middle" style="fill:var(--color-magenta);font-weight:700">app-shell</text>
  <text class="lbl" x="370" y="388" text-anchor="middle">header/footer/theme/i18n</text>
  <text class="lbl" x="370" y="400" text-anchor="middle">the ⓘ modal you are reading</text>

  <rect class="bx" x="462" y="352" width="140" height="52" rx="9"/>
  <text class="mu" x="532" y="372" text-anchor="middle" style="fill:var(--color-magenta);font-weight:700">data vault</text>
  <text class="lbl" x="532" y="388" text-anchor="middle">provenance manifests</text>
  <text class="lbl" x="532" y="400" text-anchor="middle">(no runtime)</text>

  <path class="link-sh" d="M180 258 C240 320 300 340 300 356"/>
  <path class="link-sh" d="M755 258 C660 320 560 340 540 356"/>
  <text class="lbl-sh" x="250" y="340">every member installs the shell + reads the vault</text>

  <text class="sub" x="24" y="452">Moving, re-deploying or retiring any app never touches the hub code, only its one row in registry.json. "live" is granted only at at-bar review; every other deployed app stays "building".</text>
</svg>
